name: monorepo-template

x-app: &app
  build:
    context: .
  image: monorepo-template-app

services:
  postgres:
    image: postgres:16-alpine
    container_name: monorepo-template-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-monorepo_template}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: monorepo-template-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: monorepo-template-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}"
      MINIO_API_CORS_ALLOW_ORIGIN: "${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:4000}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: monorepo-template-minio-init
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}"
      S3_BUCKET: "${S3_BUCKET:-sip-manajemen}"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"${MINIO_ROOT_USER}\" \"${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing local/\"${S3_BUCKET:-sip-manajemen}\" &&
      exit 0"

  api:
    <<: *app
    container_name: monorepo-template-api
    restart: unless-stopped
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      API_PORT: "${API_PORT:-8000}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-dev-change-me}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:8000}"
      CLIENT_ORIGINS: "${CLIENT_ORIGINS:-http://localhost:3000,http://localhost:4000}"
      DATABASE_URL: "${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/monorepo_template?schema=public}"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID}"
      S3_BUCKET: "${S3_BUCKET:-sip-manajemen}"
      S3_ENDPOINT: "${S3_ENDPOINT:-http://localhost:9000}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:-}"
      S3_REGION: "${S3_REGION:-auto}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY}"
      TELEMETRY_API_KEY: "${TELEMETRY_API_KEY:-}"
      TELEMETRY_API_KEY_HEADER: "${TELEMETRY_API_KEY_HEADER:-authorization}"
      TELEMETRY_EXPORTER: "${TELEMETRY_EXPORTER:-console}"
      TELEMETRY_EXPORTER_OTLP_ENDPOINT: "${TELEMETRY_EXPORTER_OTLP_ENDPOINT:-}"
      TELEMETRY_SERVICE_NAMESPACE: "${TELEMETRY_SERVICE_NAMESPACE:-monorepo-template}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: sh -c "pnpm --filter @repo/api exec prisma migrate deploy && pnpm --filter @repo/api start"

  admin:
    <<: *app
    image: monorepo-template-app
    container_name: monorepo-template-admin
    restart: unless-stopped
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
    ports:
      - "4000:4000"
    depends_on:
      api:
        condition: service_started
    command: sh -c "pnpm --filter @repo/admin build && pnpm --filter @repo/admin preview"

  worker:
    <<: *app
    image: monorepo-template-app
    container_name: monorepo-template-worker
    restart: unless-stopped
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      DATABASE_URL: "${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/monorepo_template?schema=public}"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_BUCKET: "${S3_BUCKET:-sip-manajemen}"
      S3_ENDPOINT: "${S3_ENDPOINT:-http://localhost:9000}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
      S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL:-}"
      S3_REGION: "${S3_REGION:-auto}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      TELEMETRY_API_KEY: "${TELEMETRY_API_KEY:-}"
      TELEMETRY_API_KEY_HEADER: "${TELEMETRY_API_KEY_HEADER:-authorization}"
      TELEMETRY_EXPORTER: "${TELEMETRY_EXPORTER:-console}"
      TELEMETRY_EXPORTER_OTLP_ENDPOINT: "${TELEMETRY_EXPORTER_OTLP_ENDPOINT:-}"
      TELEMETRY_SERVICE_NAMESPACE: "${TELEMETRY_SERVICE_NAMESPACE:-monorepo-template}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter @repo/worker start

volumes:
  postgres_data:
  redis_data:
  minio_data:
